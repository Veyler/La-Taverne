<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Taverne</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.socket.io/socket.io-3.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div>
        <div class="chat-container">
            <div id="ChatBox"></div>
            <div class="input-section">
                <input type="text" id="InputMessage" placeholder="Votre message...">
                <button type="submit" onclick="send_clicked(this)">Envoyer</button>
            </div>
        </div>
        <button id="disconnect_button" class="btn-disconnect" type="submit" onclick="disconnect_clicked(this)">Déconnexion</button>
    </div>
    <script src="/js/render.js"></script>
</body>
</html>
