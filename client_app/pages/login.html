<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Taverne - Connexion</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/socket.io-3.0.0.js"></script>
</head>
<body>
    <div>
        <div class="login-container">
            <div class="logo-section">
                <img src="../assets/Dark blue.png" alt="La Taverne">
            </div>
            <div class="login-box">
                <div class="login-header">
                    <h2>La Taverne</h2>
                    <p>Accédez à la taverne</p>
                </div>
                <div class="form-group">
                    <label>Identifiant</label>
                    <input type="text" id="id" placeholder="Votre pseudo">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="text" id="password" placeholder="Votre mot de passe">
                </div>
                <button class="btn-submit" type="submit" onclick="connexion_clicked(this)">Connexion</button>
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
